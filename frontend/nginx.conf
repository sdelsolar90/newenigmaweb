server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml application/xhtml+xml application/xml font/woff2 application/font-woff2;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|webp|svg|ico|woff2|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/en(/.*)?$ {
        try_files /index.html =404;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '<html lang="es"' '<html lang="en"';
        sub_filter '<title>Enigma Developers | Tu área IT sin costos internos</title>' '<title>Enigma Developers | Your IT Team Without the Overhead</title>';
        sub_filter 'content="Enigma Developers - El área IT completa de tu empresa, sin los costos de tenerla interna. Desarrollo web, servidores, ciberseguridad, IA y más."' 'content="Enigma Developers - Your complete IT department without the cost of having one in-house. Web development, servers, cybersecurity, AI and more."';
        sub_filter 'content="Enigma Developers - Tu equipo IT sin costos internos"' 'content="Enigma Developers - Your IT Team Without the Overhead"';
        sub_filter 'content="Soluciones tecnológicas integrales para PYMEs. Desarrollo web, cloud, ciberseguridad, automatización e inteligencia artificial."' 'content="Comprehensive technology solutions for SMBs. Web development, cloud, cybersecurity, automation and artificial intelligence."';
        sub_filter 'content="https://enigmasac.com"' 'content="https://enigmasac.com/en"';
        sub_filter 'content="es_ES"' 'content="en_US"';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
